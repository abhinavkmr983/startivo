<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Startivo Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6C63FF; --accent: #3ECFCF;
      --gradient: linear-gradient(135deg, #6C63FF 0%, #3ECFCF 100%);
      --bg: #f0eeff; --white: #fff;
      --text: #1a1a2e; --text-light: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(108,99,255,0.10);
      --shadow-lg: 0 8px 40px rgba(108,99,255,0.18);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .admin-header {
      background: var(--gradient); color: #fff; padding: 0;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(108,99,255,0.3);
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto; padding: 20px 32px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    .header-brand .logo { font-size: 1.4rem; font-weight: 900; }
    .header-brand .subtitle { font-size: 0.85rem; opacity: 0.82; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .count-badge { background: rgba(255,255,255,0.22); color: #fff; padding: 7px 18px; border-radius: 50px; font-size: 0.85rem; font-weight: 700; }
    .btn-header {
      background: rgba(255,255,255,0.18); color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 18px; border-radius: 50px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
    }
    .btn-header:hover { background: rgba(255,255,255,0.3); }
    .secret-screen {
      min-height: calc(100vh - 80px);
      display: flex; align-items: center; justify-content: center; padding: 40px 20px;
    }
    .secret-card {
      background: var(--white); border-radius: 24px; padding: 52px 44px;
      max-width: 460px; width: 100%; box-shadow: var(--shadow-lg);
      text-align: center; border: 1px solid var(--border);
    }
    .lock-icon {
      width: 72px; height: 72px; background: var(--gradient);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 24px;
    }
    .lock-icon i { color: #fff; font-size: 1.8rem; }
    .secret-card h2 { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
    .secret-card > p { color: var(--text-light); margin-bottom: 32px; font-size: 0.95rem; }
    .secret-input-wrap { position: relative; margin-bottom: 16px; }
    .secret-input-wrap i {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--text-light); font-size: 0.9rem;
    }
    .secret-input-wrap input {
      width: 100%; padding: 14px 16px 14px 44px;
      border: 2px solid var(--border); border-radius: 12px;
      font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; color: var(--text);
    }
    .secret-input-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(108,99,255,0.10); }
    .btn-access {
      width: 100%; padding: 15px; background: var(--gradient); color: #fff;
      border: none; border-radius: 50px; font-size: 1rem; font-weight: 800;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-access:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(108,99,255,0.4); }
    .auth-error { color: #dc2626; font-size: 0.85rem; font-weight: 600; margin-top: 12px; min-height: 20px; }
    .main-panel { max-width: 1200px; margin: 0 auto; padding: 36px 24px; }
    .stats-row { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 32px; }
    .stat-card {
      background: var(--white); border-radius: 16px; padding: 24px 28px;
      box-shadow: var(--shadow); flex: 1; min-width: 160px;
      border: 1px solid var(--border); transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-3px); }
    .stat-card .num {
      font-size: 2.2rem; font-weight: 900;
      background: var(--gradient); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text; display: block;
    }
    .stat-card .lbl { color: var(--text-light); font-size: 0.85rem; font-weight: 500; margin-top: 4px; }
    .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; align-items: center; }
    .filter-btn {
      padding: 8px 18px; border-radius: 50px; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; border: 2px solid var(--border); background: var(--white);
      color: var(--text-light); transition: all 0.2s; font-family: 'Inter', sans-serif;
    }
    .filter-btn.active, .filter-btn:hover { background: var(--gradient); color: #fff; border-color: transparent; }
    .search-input {
      padding: 9px 16px; border: 2px solid var(--border); border-radius: 50px;
      font-size: 0.85rem; font-family: 'Inter', sans-serif; outline: none;
      transition: border-color 0.2s; margin-left: auto; width: 220px; color: var(--text);
    }
    .search-input:focus { border-color: var(--primary); }
    .ideas-list { display: flex; flex-direction: column; gap: 18px; }
    .idea-card {
      background: var(--white); border-radius: 18px; padding: 28px 32px;
      box-shadow: var(--shadow); border-left: 5px solid var(--primary);
      transition: transform 0.2s, box-shadow 0.2s; animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    .idea-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .idea-card-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
    .idea-name { font-size: 1.1rem; font-weight: 800; }
    .tag { padding: 5px 14px; border-radius: 50px; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }
    .tag-website { background: #ede9fe; color: #7c3aed; }
    .tag-app { background: #dbeafe; color: #1d4ed8; }
    .tag-startup { background: #dcfce7; color: #15803d; }
    .tag-other { background: #fef3c7; color: #b45309; }
    .meta-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .meta-item { display: flex; align-items: center; gap: 7px; color: var(--text-light); font-size: 0.85rem; }
    .meta-item i { color: var(--primary); font-size: 0.82rem; }
    .meta-item a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .meta-item a:hover { text-decoration: underline; }
    .idea-desc { color: #374151; font-size: 0.92rem; line-height: 1.65; background: var(--bg); padding: 16px; border-radius: 10px; margin-bottom: 18px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .date-label { color: #9ca3af; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
    .card-actions { display: flex; gap: 10px; }
    .btn-wa {
      background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0;
      padding: 7px 16px; border-radius: 50px; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .btn-wa:hover { background: #25D366; color: #fff; border-color: #25D366; }
    .btn-delete {
      background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
      padding: 7px 16px; border-radius: 50px; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
    }
    .btn-delete:hover { background: #dc2626; color: #fff; border-color: #dc2626; }
    .loading-state { text-align: center; padding: 80px 20px; color: var(--text-light); }
    .loading-state i { font-size: 2.5rem; color: var(--primary); display: block; margin-bottom: 16px; }
    .empty-state { text-align: center; padding: 80px 20px; }
    .empty-state i { font-size: 3rem; color: #d1d5db; display: block; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.2rem; color: var(--text-light); margin-bottom: 8px; }
    .empty-state p { color: #9ca3af; font-size: 0.9rem; }
    .hidden { display: none !important; }
    @media (max-width: 600px) {
      .header-inner { padding: 16px 20px; }
      .main-panel { padding: 24px 16px; }
      .idea-card { padding: 20px; }
      .secret-card { padding: 36px 24px; }
      .search-input { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>

<div class="admin-header">
  <div class="header-inner">
    <div class="header-brand">
      <div>
        <div class="logo">⚡ Startivo — Admin Panel</div>
        <div class="subtitle">Manage all submitted ideas</div>
      </div>
    </div>
    <div class="header-right">
      <div class="count-badge" id="countBadge">—</div>
      <button class="btn-header hidden" id="refreshBtn" onclick="refreshIdeas()">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
    </div>
  </div>
</div>

<div class="secret-screen" id="secretScreen">
  <div class="secret-card">
    <div class="lock-icon"><i class="fas fa-lock"></i></div>
    <h2>Startivo Admin Access</h2>
    <p>Enter your secret key to view all submitted ideas</p>
    <div class="secret-input-wrap">
      <i class="fas fa-key"></i>
      <input type="password" id="secretInput" placeholder="Enter admin secret key..."/>
    </div>
    <button class="btn-access" onclick="loadIdeas()">
      <i class="fas fa-unlock"></i> Access Dashboard
    </button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<div class="main-panel hidden" id="mainPanel">
  <div class="stats-row" id="statsRow"></div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterIdeas('All', this)">All</button>
    <button class="filter-btn" onclick="filterIdeas('Website', this)">Website</button>
    <button class="filter-btn" onclick="filterIdeas('Mobile App', this)">Mobile App</button>
    <button class="filter-btn" onclick="filterIdeas('Startup Idea', this)">Startup Idea</button>
    <button class="filter-btn" onclick="filterIdeas('Other', this)">Other</button>
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search..." oninput="searchIdeas(this.value)"/>
  </div>
  <div class="ideas-list" id="ideasList">
    <div class="loading-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
  </div>
</div>

<script>
  const ADMIN_API = "/api/admin/ideas";
  const DELETE_API = "/api/admin/ideas";
  let currentSecret = "";
  let allIdeas = [];
  let currentFilter = "All";

  async function loadIdeas() {
    const secret = document.getElementById("secretInput").value.trim();
    if (!secret) { document.getElementById("authError").textContent = "Please enter the secret key."; return; }
    currentSecret = secret;
    document.getElementById("authError").textContent = "";
    try {
      const res = await fetch(`${ADMIN_API}?secret=${secret}`);
      const data = await res.json();
      if (!data.success) { document.getElementById("authError").textContent = "❌ Invalid secret key. Access denied."; return; }
      allIdeas = data.data;
      document.getElementById("secretScreen").classList.add("hidden");
      document.getElementById("mainPanel").classList.remove("hidden");
      document.getElementById("refreshBtn").classList.remove("hidden");
      renderIdeas(allIdeas);
    } catch (err) {
      document.getElementById("authError").textContent = "⚠️ Server error. Try again.";
    }
  }

  async function refreshIdeas() {
    try {
      const res = await fetch(`${ADMIN_API}?secret=${currentSecret}`);
      const data = await res.json();
      if (data.success) { allIdeas = data.data; filterIdeas(currentFilter, null); }
    } catch (e) {}
  }

  function renderIdeas(ideas) {
    const list = document.getElementById("ideasList");
    document.getElementById("countBadge").textContent = `${allIdeas.length} Submissions`;
    const types = {};
    allIdeas.forEach(i => { types[i.projectType] = (types[i.projectType] || 0) + 1; });
    document.getElementById("statsRow").innerHTML = `
      <div class="stat-card"><span class="num">${allIdeas.length}</span><div class="lbl">Total Submissions</div></div>
      ${Object.entries(types).map(([k, v]) => `<div class="stat-card"><span class="num">${v}</span><div class="lbl">${k}</div></div>`).join("")}
    `;
    if (ideas.length === 0) {
      list.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><h3>No submissions found</h3><p>No ideas match your current filter.</p></div>`;
      return;
    }
    list.innerHTML = ideas.map(idea => {
      const tagClass = { "Website": "tag-website", "Mobile App": "tag-app", "Startup Idea": "tag-startup", "Other": "tag-other" }[idea.projectType] || "tag-other";
      const date = new Date(idea.submittedAt).toLocaleString("en-IN", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
      const waLink = `https://wa.me/${idea.phone.replace(/[^0-9]/g,'')}?text=Hi ${encodeURIComponent(idea.fullName)}, this is Startivo!`;
      return `
        <div class="idea-card" id="card-${idea._id}">
          <div class="idea-card-top">
            <div class="idea-name">${escHtml(idea.fullName)}</div>
            <span class="tag ${tagClass}">${escHtml(idea.projectType)}</span>
          </div>
          <div class="meta-row">
            <span class="meta-item"><i class="fas fa-envelope"></i><a href="mailto:${escHtml(idea.email)}">${escHtml(idea.email)}</a></span>
            <span class="meta-item"><i class="fas fa-phone"></i><a href="tel:${escHtml(idea.phone)}">${escHtml(idea.phone)}</a></span>
            ${idea.budgetRange && idea.budgetRange !== "Not specified" ? `<span class="meta-item"><i class="fas fa-rupee-sign"></i>${escHtml(idea.budgetRange)}</span>` : ""}
            ${idea.timeline && idea.timeline !== "Not specified" ? `<span class="meta-item"><i class="fas fa-clock"></i>${escHtml(idea.timeline)}</span>` : ""}
          </div>
          <div class="idea-desc">${escHtml(idea.ideaDescription)}</div>
          <div class="card-footer">
            <span class="date-label"><i class="fas fa-calendar-alt"></i> ${date}</span>
            <div class="card-actions">
              <a href="${waLink}" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>
              <button class="btn-delete" onclick="deleteIdea('${idea._id}')"><i class="fas fa-trash"></i> Delete</button>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  function filterIdeas(type, btn) {
    currentFilter = type;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    if (btn) btn.classList.add("active");
    const filtered = type === "All" ? allIdeas : allIdeas.filter(i => i.projectType === type);
    document.getElementById("searchInput").value = "";
    renderIdeas(filtered);
  }

  function searchIdeas(query) {
    const q = query.toLowerCase();
    const filtered = allIdeas.filter(i =>
      i.fullName.toLowerCase().includes(q) ||
      i.email.toLowerCase().includes(q) ||
      i.phone.includes(q) ||
      i.ideaDescription.toLowerCase().includes(q)
    );
    renderIdeas(filtered);
  }

  async function deleteIdea(id) {
    if (!confirm("Delete this submission from Startivo?")) return;
    try {
      const res = await fetch(`${DELETE_API}/${id}?secret=${currentSecret}`, { method: "DELETE" });
      const data = await res.json();
      if (data.success) {
        allIdeas = allIdeas.filter(i => i._id !== id);
        const card = document.getElementById(`card-${id}`);
        if (card) { card.style.opacity = "0"; card.style.transform = "scale(0.95)"; card.style.transition = "all 0.2s"; setTimeout(() => card.remove(), 200); }
        document.getElementById("countBadge").textContent = `${allIdeas.length} Submissions`;
      }
    } catch (err) { alert("Error deleting."); }
  }

  function escHtml(str) {
    if (!str) return "";
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  document.getElementById("secretInput").addEventListener("keydown", e => {
    if (e.key === "Enter") loadIdeas();
  });
</script>
</body>
</html>
